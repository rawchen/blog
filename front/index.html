<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>
    <script>
      try {
        var cached = localStorage.getItem('site_config')
        if (cached) {
          var data = JSON.parse(cached)
          // 标题
          if (data.siteName) document.title = data.siteName
          // Favicon
          if (data.siteFavicon) {
            var link = document.querySelector("link[rel*='icon']") || document.createElement('link')
            link.rel = 'icon'
            link.href = data.siteFavicon
            document.head.appendChild(link)
          }
          // Description
          if (data.siteDescription) {
            var metaDesc = document.querySelector('meta[name="description"]')
            if (!metaDesc) {
              metaDesc = document.createElement('meta')
              metaDesc.name = 'description'
              document.head.appendChild(metaDesc)
            }
            metaDesc.content = data.siteDescription
          }
          // Keywords
          if (data.siteKeywords) {
            var metaKeywords = document.querySelector('meta[name="keywords"]')
            if (!metaKeywords) {
              metaKeywords = document.createElement('meta')
              metaKeywords.name = 'keywords'
              document.head.appendChild(metaKeywords)
            }
            metaKeywords.content = data.siteKeywords
          }
        }
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    // 全局 Toast 函数
    function showToast(message) {
      var existing = document.querySelector('.global-toast');
      if (existing) existing.remove();
      var toast = document.createElement('div');
      toast.className = 'global-toast';
      toast.textContent = message;
      toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.6);padding:10px 20px;background:rgba(0,0,0,0.6);color:#fff;border-radius:2px;font-size:14px;z-index:2147483647;transition:transform 0.3s,opacity 0.3s;opacity:0;';
      document.body.appendChild(toast);
      setTimeout(function() { toast.style.transform = 'translate(-50%,-50%) scale(1)'; toast.style.opacity = '1'; }, 10);
      setTimeout(function() { toast.style.transform = 'translate(-50%,-50%) scale(0.6)'; toast.style.opacity = '0.6'; setTimeout(function() { toast.remove(); }, 300); }, 3000);
    }

    // 复制提示
    document.body.oncopy = function() {
      showToast('复制成功，若要转载请务必保留本文链接！');
    };

    // 禁用F12
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 || e.key === 'F12') {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        showToast("F12被禁用");
        return false;
      }
    }, true);
    </script>
  </body>
</html>
