<!DOCTYPE html>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>
    <script>
      try {
        var cached = localStorage.getItem('site_config')
        if (cached) {
          var data = JSON.parse(cached)
          // 标题
          if (data.siteName) document.title = data.siteName
          // Favicon
          if (data.siteFavicon) {
            var link = document.querySelector("link[rel*='icon']") || document.createElement('link')
            link.rel = 'icon'
            link.href = data.siteFavicon
            document.head.appendChild(link)
          }
          // Description
          if (data.siteDescription) {
            var metaDesc = document.querySelector('meta[name="description"]')
            if (!metaDesc) {
              metaDesc = document.createElement('meta')
              metaDesc.name = 'description'
              document.head.appendChild(metaDesc)
            }
            metaDesc.content = data.siteDescription
          }
          // Keywords
          if (data.siteKeywords) {
            var metaKeywords = document.querySelector('meta[name="keywords"]')
            if (!metaKeywords) {
              metaKeywords = document.createElement('meta')
              metaKeywords.name = 'keywords'
              document.head.appendChild(metaKeywords)
            }
            metaKeywords.content = data.siteKeywords
          }
        }
      } catch {}
    </script>
  </head>
