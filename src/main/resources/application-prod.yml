# 生产环境配置

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: root
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 587
    username: xxx@qq.com
    password: xxx
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          starttls:
            enable: true
    from: xxx@qq.com

# 阿里云OSS配置
aliyun:
  oss:
    access-key-id: xxx
    access-key-secret: xxx
    role-arn: acs:ram::xxx:role/xxx
    endpoint: oss-cn-xxx.aliyuncs.com
    bucket-name: xxx
    custom-domain:
    sts-expiration: 3600
    upload-folder: blog

# DeepSeek AI配置
deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  base-url: https://api.deepseek.com
  chat-model: deepseek-v4-flash

# 生产环境关闭Swagger
springfox:
  documentation:
    enabled: false

knife4j:
  enable: false
  production: true

# 日志级别
logging:
  level:
    com.rawchen.blog: info
